<!-- Code Generated by Sidekick is for learning and experimentation purposes only. -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Customer • Sign in</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container shell">
    <div class="card">
      <div class="head">
        <div class="brand">
          <div class="logo"></div>
          <div>
            <h1 class="h1">Customer Portal</h1>
            <p class="sub">Reserve equipment by date & time</p>
          </div>
        </div>
        <div class="pill">API: http://localhost:8000</div>
      </div>

      <div class="body grid">
        <div class="panel">
          <div class="stack">
            <div>
              <div class="small">Email</div>
              <input class="input" id="email" placeholder="you@company.com" autocomplete="username" />
            </div>
            <div>
              <div class="small">Password</div>
              <input class="input" id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
            </div>

            <div class="row" style="justify-content:flex-start;">
              <button class="btn primary" id="loginBtn">Sign in</button>
              <a class="btn" href="register.html">Create account</a>
              <button class="btn ghost" id="demoBtn">Use default user</button>
            </div>

            <div id="msg" class="msg error"></div>
          </div>
        </div>

        <div class="panel">
          <div style="font-weight:850; font-size:14px;">Default accounts (seeded)</div>
          <div class="hr"></div>
          <div class="small">Customer</div>
          <div class="pill" style="display:inline-block;margin-top:6px;">user@example.com / user1234</div>
          <div class="hr"></div>
          <div class="small">Tip</div>
          <div class="sub">If you see CORS errors, serve these HTML files on http://localhost:5500.</div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Code Generated by Sidekick is for learning and experimentation purposes only.
    document.getElementById("demoBtn").onclick = () => {
      document.getElementById("email").value = "user@example.com";
      document.getElementById("password").value = "user1234";
    };

    document.getElementById("loginBtn").onclick = async () => {
      const msg = document.getElementById("msg");
      msg.textContent = "";
      try{
        const data = await CustomerAPI.login(
          document.getElementById("email").value.trim(),
          document.getElementById("password").value
        );
        if(data.role !== "customer") throw new Error("Not a customer account");
        window.location.href = "index.html";
      }catch(e){
        msg.textContent = "Login failed. Check email/password.";
      }
    };
  </script>
</body>
</html>

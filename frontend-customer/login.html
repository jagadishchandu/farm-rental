<!-- Code Generated by Sidekick is for learning and experimentation purposes only. -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Customer Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div class="brand">
          <div class="logo"></div>
          <div>
            <p class="kicker">Farm Tool Rentals</p>
            <h1>Customer Portal</h1>
          </div>
        </div>
        <div class="actions">
          <a class="btn" href="index.html">Catalog</a>
        </div>
      </div>

      <div class="grid">
        <div class="panel">
          <div class="hd">
            <div>
              <h2>Sign in</h2>
              <p class="sub">Book equipment by date & time</p>
            </div>
          </div>
          <div class="bd">
            <div class="formRow">
              <input class="input" id="email" placeholder="Email" />
              <input class="input" id="password" type="password" placeholder="Password" />
            </div>

            <div class="toolbar">
              <button class="btn primary" id="loginBtn">Login</button>
              <button class="btn" id="demoBtn">Use demo</button>
            </div>

            <p id="msg" class="msg error"></p>
            <p class="helper">MVP: register users via <code>/auth/register</code>.</p>
          </div>
        </div>

        <div class="panel">
          <div class="hd">
            <div>
              <h2>Premium experience</h2>
              <p class="sub">Fast browse, clean checkout</p>
            </div>
          </div>
          <div class="bd">
            <div class="pill ok">Quick-view details</div>
            <div class="pill" style="margin-top:10px;">Cart drawer</div>
            <div class="pill low" style="margin-top:10px;">Server-side availability</div>
            <p class="helper" style="margin-top:10px;">
              Tip: enter accurate pickup/return times to avoid conflicts.
            </p>
          </div>
        </div>
      </div>

      <div id="toast" class="toast">
        <p class="t"></p><p class="d"></p>
      </div>
    </div>

    <script src="app.js"></script>
    <script>
      // Code Generated by Sidekick is for learning and experimentation purposes only.
      document.getElementById("demoBtn").onclick = () => {
        document.getElementById("email").value = "cust@example.com";
        document.getElementById("password").value = "cust123";
      };

      document.getElementById("loginBtn").onclick = async () => {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const msg = document.getElementById("msg");
        msg.textContent = "";
        try{
          await login(email,password);
          toast("Signed in","Welcome back.");
          setTimeout(()=> window.location.href="index.html", 450);
        }catch{
          msg.textContent = "Login failed. Check email/password.";
        }
      };
    </script>
  </body>
</html>

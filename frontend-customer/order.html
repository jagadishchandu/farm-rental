<!-- Code Generated by Sidekick is for learning and experimentation purposes only. -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Order</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div class="brand">
          <div class="logo"></div>
          <div>
            <p class="kicker">Farm Tool Rentals</p>
            <h1>Order summary</h1>
          </div>
        </div>
        <div class="actions">
          <a class="btn" href="index.html">Back to catalog</a>
          <button class="btn danger" onclick="logout()">Logout</button>
        </div>
      </div>

      <div class="grid">
        <div class="panel">
          <div class="hd">
            <div>
              <h2>Draft order</h2>
              <p class="sub">Review lines and confirm</p>
            </div>
            <div class="actions">
              <button class="btn" onclick="refresh()">Refresh</button>
              <button class="btn primary" onclick="confirmOrder()">Confirm</button>
            </div>
          </div>
          <div class="bd">
            <p id="err" class="msg error"></p>
            <p id="ok" class="msg ok"></p>
            <div id="view"></div>
          </div>
        </div>

        <div class="panel">
          <div class="hd">
            <div>
              <h2>What’s next</h2>
              <p class="sub">Recommended MVP additions</p>
            </div>
          </div>
          <div class="bd">
            <div class="pill ok">Pickup/return instructions</div>
            <div class="pill" style="margin-top:10px;">Deposits + damage policy</div>
            <div class="pill low" style="margin-top:10px;">Hold inventory for 10 minutes</div>
            <p class="helper" style="margin-top:10px;">
              If you want “holds,” we’ll add a <code>held</code> status + expiration.
            </p>
          </div>
        </div>
      </div>

      <div id="toast" class="toast"><p class="t"></p><p class="d"></p></div>
    </div>

    <script src="app.js"></script>
    <script>
      // Code Generated by Sidekick is for learning and experimentation purposes only.
      requireAuth();

      function hoursBetween(startIso, endIso){
        const s = new Date(startIso).getTime();
        const e = new Date(endIso).getTime();
        if(Number.isNaN(s) || Number.isNaN(e) || e<=s) return 0;
        return (e - s) / (1000*60*60);
      }
      function money(n){
        const x = Number(n || 0);
        return x.toLocaleString(undefined,{style:"currency",currency:"USD"});
      }

      async function refresh(){
        document.getElementById("err").textContent = "";
        document.getElementById("ok").textContent = "";

        const orderId = localStorage.getItem("draft_order_id");
        const view = document.getElementById("view");

        if(!orderId){
          view.innerHTML = `<div class="pill low">No draft order</div><p class="helper">Go to catalog to add tools.</p>`;
          return;
        }

        const o = await apiGet(`/orders/${orderId}`);
        const lines = o.lines || [];

        if(!lines.length){
          view.innerHTML = `<div class="pill low">Draft is empty</div><p class="helper">Go to catalog to add tools.</p>`;
          return;
        }

        let est = 0;
        for(const l of lines){
          est += Number(l.hourly_rate||0) * hoursBetween(l.start_ts,l.end_ts) * Number(l.qty||0);
        }

        view.innerHTML = `
          <div class="pill">Draft #${o.id}</div>
          <div class="pill" style="margin-left:8px;">Lines: ${lines.length}</div>
          <div class="pill ok" style="margin-left:8px;">Est: ${money(est)}</div>

          <div style="margin-top:12px;display:grid;gap:10px;">
            ${lines.map(l => `
              <div class="lineItem" style="grid-template-columns:60px 1fr;">
                <div class="thumb" style="width:60px;height:60px;border-radius:18px;">
                  ${l.image_url ? `<img src="${l.image_url}" alt="" />` : ``}
                </div>
                <div>
                  <p class="liTitle">${l.tool_name || ("Tool #" + l.tool_id)}</p>
                  <p class="liMeta">
                    Qty: <b>${l.qty}</b> • ${fmtLocal(l.start_ts)} → ${fmtLocal(l.end_ts)}
                    <br/>Rate: ${l.hourly_rate != null ? ("$" + l.hourly_rate + "/hr") : "n/a"}
                  </p>
                  <div class="toolbar" style="margin-top:8px;">
                    <button class="btn danger" onclick="removeLine(${o.id}, ${l.id})">Remove</button>
                  </div>
                </div>
              </div>
            `).join("")}
          </div>
        `;
      }

      async function removeLine(orderId, lineId){
        await apiDelete(`/orders/${orderId}/lines/${lineId}`);
        toast("Removed","Line removed from your draft.");
        await refresh();
      }

      async function confirmOrder(){
        const err = document.getElementById("err");
        const ok = document.getElementById("ok");
        err.textContent = ""; ok.textContent = "";

        const orderId = localStorage.getItem("draft_order_id");
        if(!orderId){ err.textContent = "No draft order."; return; }

        try{
          await apiPost(`/orders/${orderId}/confirm`, {});
          localStorage.removeItem("draft_order_id");
          ok.textContent = "Confirmed. Your rental is locked in.";
          toast("Confirmed","All lines reserved successfully.");
          await refresh();
        }catch(e){
          const j = e.json;
          const detail = (j && j.detail && typeof j.detail === "object")
            ? `Only ${j.detail.available_qty} available (requested ${j.detail.requested_qty}).`
            : "Not enough availability for a line.";
          err.textContent = "Confirm failed. " + detail;
          toast("Confirm failed", detail);
        }
      }

      refresh().catch(()=>{});
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Customer • Register</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container shell">
    <div class="card">
      <div class="head">
        <div class="brand">
          <div class="logo"></div>
          <div>
            <h1 class="h1">Create Customer Account</h1>
            <p class="sub">Credentials are stored securely (hashed) in Postgres</p>
          </div>
        </div>
        <a class="btn" href="login.html">Back to sign in</a>
      </div>

      <div class="body">
        <div class="panel">
          <div class="grid" style="grid-template-columns:1fr 1fr;">
            <div class="stack">
              <div class="small">Email</div>
              <input class="input" id="email" placeholder="you@company.com" autocomplete="username" />
            </div>
            <div class="stack">
              <div class="small">Password (min 6)</div>
              <input class="input" id="password" type="password" placeholder="Create a password" autocomplete="new-password" />
            </div>
          </div>

          <div class="row" style="margin-top:12px;">
            <button class="btn primary" id="regBtn">Create account</button>
          </div>

          <div id="msg" class="msg error"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Code Generated by Sidekick is for learning and experimentation purposes only.
    document.getElementById("regBtn").onclick = async () => {
      const msg = document.getElementById("msg");
      msg.className = "msg";
      msg.textContent = "";
      try{
        await CustomerAPI.registerCustomer(
          document.getElementById("email").value.trim(),
          document.getElementById("password").value
        );
        msg.className = "msg ok";
        msg.textContent = "Account created. Redirecting to sign in...";
        setTimeout(()=> window.location.href="login.html", 900);
      }catch(e){
        msg.className = "msg error";
        msg.textContent = "Registration failed (email exists or invalid).";
      }
    };
  </script>
</body>
</html>

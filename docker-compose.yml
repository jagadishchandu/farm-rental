# Code Generated by Sidekick is for learning and experimentation purposes only.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: rentaldb
      POSTGRES_USER: rental
      POSTGRES_PASSWORD: rentalpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rental -d rentaldb"]
      interval: 2s
      timeout: 2s
      retries: 30

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://rental:rentalpass@db:5432/rentaldb
      JWT_SECRET: change-me-in-prod
      ADMIN_CREATE_SECRET: admin-create-secret

      DEFAULT_ADMIN_EMAIL: admin@example.com
      DEFAULT_ADMIN_PASSWORD: admin123
      DEFAULT_CUSTOMER_EMAIL: user@example.com
      DEFAULT_CUSTOMER_PASSWORD: user1234

      CORS_ORIGINS: http://localhost:5500,http://127.0.0.1:5500,http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: {}


services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALG: ${JWT_ALG}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      CORS_ORIGINS: ${CORS_ORIGINS}
    ports:
      - "8000:8000"
    depends_on:
      - db

  customer-ui:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./frontend-customer:/usr/share/nginx/html:ro
      - ./frontend-customer/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  admin-ui:
    image: nginx:alpine
    ports:
      - "8082:80"
    volumes:
      - ./frontend-admin:/usr/share/nginx/html:ro
      - ./frontend-admin/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  pgdata:

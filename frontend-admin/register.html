<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin • Register</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="container shell">
    <div class="card">
      <div class="head">
        <div class="brand">
          <div class="logo"></div>
          <div>
            <h1 class="h1">Register Admin</h1>
            <p class="sub">Requires ADMIN_CREATE_SECRET</p>
          </div>
        </div>
        <a class="btn" href="./login.html">Back</a>
      </div>

      <div class="body">
        <div class="panel">
          <div class="grid" style="grid-template-columns:1fr 1fr;">
            <div class="stack">
              <div class="small">Email</div>
              <input class="input" id="email" placeholder="admin@company.com" autocomplete="username" />
            </div>
            <div class="stack">
              <div class="small">Password (min 6)</div>
              <input class="input" id="password" type="password" placeholder="Create a password" autocomplete="new-password" />
            </div>
          </div>

          <div class="stack" style="margin-top:10px;">
            <div class="small">Admin secret</div>
            <input class="input" id="secret" type="password" placeholder="admin-create-secret" />
          </div>

          <div class="row" style="margin-top:12px;">
            <button class="btn primary" id="regBtn">Create admin</button>
          </div>

          <div id="msg" class="msg error"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
  <script>
    // Code Generated by Sidekick is for learning and experimentation purposes only.
    document.getElementById("regBtn").onclick = async () => {
      const msg = document.getElementById("msg");
      msg.className = "msg";
      msg.textContent = "";
      try{
        await AdminAPI.registerAdmin(
          document.getElementById("email").value.trim(),
          document.getElementById("password").value,
          document.getElementById("secret").value
        );
        msg.className = "msg ok";
        msg.textContent = "Admin created. Redirecting...";
        setTimeout(()=> window.location.href="./login.html", 900);
      }catch(e){
        msg.className = "msg error";
        msg.textContent = "Admin registration failed.";
      }
    };
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin • Sign in</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container shell">
    <div class="card">
      <div class="head">
        <div class="brand">
          <div class="logo"></div>
          <div>
            <h1 class="h1">Admin Console</h1>
            <p class="sub">Manage inventory and tool catalog</p>
          </div>
        </div>
        <div class="pill">Default admin seeded</div>
      </div>

      <div class="body grid">
        <div class="panel">
          <div class="stack">
            <div>
              <div class="small">Admin email</div>
              <input class="input" id="email" placeholder="admin@company.com" autocomplete="username" />
            </div>
            <div>
              <div class="small">Password</div>
              <input class="input" id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
            </div>

            <div class="row">
              <button class="btn primary" id="loginBtn">Sign in</button>
              <a class="btn" href="register.html">Register admin</a>
              <button class="btn ghost" id="demoBtn">Use default admin</button>
            </div>

            <div id="msg" class="msg error"></div>
          </div>
        </div>

        <div class="panel">
          <div style="font-weight:850; font-size:14px;">Default admin</div>
          <div class="hr"></div>
          <div class="pill" style="display:inline-block;">admin@example.com / admin123</div>
          <div class="hr"></div>
          <div class="sub">Admin registration is protected by an admin secret.</div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Code Generated by Sidekick is for learning and experimentation purposes only.
    document.getElementById("demoBtn").onclick = () => {
      document.getElementById("email").value = "admin@example.com";
      document.getElementById("password").value = "admin123";
    };

    document.getElementById("loginBtn").onclick = async () => {
      const msg = document.getElementById("msg");
      msg.textContent = "";
      try{
        const data = await AdminAPI.login(
          document.getElementById("email").value.trim(),
          document.getElementById("password").value
        );
        if(data.role !== "admin") throw new Error("Not admin");
        window.location.href = "admin.html";
      }catch(e){
        msg.textContent = "Login failed. Check email/password.";
      }
    };
  </script>
</body>
</html>

<!-- Code Generated by Sidekick is for learning and experimentation purposes only. -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div class="brand">
          <div class="logo"></div>
          <div>
            <p class="kicker">Farm Tool Rentals</p>
            <h1>Admin Portal</h1>
          </div>
        </div>
        <div class="actions">
          <a class="btn" href="admin.html">Dashboard</a>
        </div>
      </div>

      <div class="grid">
        <div class="panel">
          <div class="hd">
            <div>
              <h2>Sign in</h2>
              <p class="sub">Manage catalog, inventory, and orders</p>
            </div>
          </div>
          <div class="bd">
            <div class="row">
              <input class="input" id="email" placeholder="Admin email" />
              <input class="input" id="password" type="password" placeholder="Password" />
            </div>
            <div class="row" style="margin-top:10px;">
              <button class="btn primary" id="loginBtn">Login</button>
              <button class="btn" id="demoBtn">Use demo admin</button>
            </div>
            <p id="msg" class="msg error"></p>
            <p class="helper">Security note: remove “role” registration in production.</p>
          </div>
        </div>

        <div class="panel">
          <div class="hd">
            <div>
              <h2>Fast actions</h2>
              <p class="sub">Typical admin workflow</p>
            </div>
          </div>
          <div class="bd">
            <div class="pill">Create tools</div>
            <div class="pill" style="margin-top:10px;">Set inventory quantity</div>
            <div class="pill" style="margin-top:10px;">Monitor confirmed orders</div>
            <p class="helper" style="margin-top:10px;">Customer UI reflects changes immediately.</p>
          </div>
        </div>
      </div>

      <div id="toast" class="toast"><p class="t"></p><p class="d"></p></div>
    </div>

    <script src="app.js"></script>
    <script>
      // Code Generated by Sidekick is for learning and experimentation purposes only. 
      document.getElementById("demoBtn").onclick = () => {
        document.getElementById("email").value = "admin@example.com";
        document.getElementById("password").value = "admin123";
      };

      document.getElementById("loginBtn").onclick = async () => {
        const msg = document.getElementById("msg");
        msg.textContent = "";
        try{
          const data = await login(
            document.getElementById("email").value.trim(),
            document.getElementById("password").value
          );
          if(data.role !== "admin") throw new Error("Not an admin account");
          toast("Signed in","Welcome to Admin.");
          setTimeout(()=> window.location.href="admin.html", 450);
        }catch(e){
          msg.textContent = "Login failed. Check credentials.";
        }
      };
    </script>
  </body>
</html>

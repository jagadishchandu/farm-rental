# Code Generated by Sidekick is for learning and experimentation purposes only.
worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;

  # For WebSocket/HTTP upgrade (safe even if unused)
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name _;

    # -----------------------
    # API (FastAPI) via /api/
    # -----------------------
    # Example: /api/auth/login  -> backend /auth/login
    location /api/ {
      proxy_pass http://backend:8000/;

      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
    }

    # -----------------------
    # Customer UI at /
    # -----------------------
    location / {
      root  /usr/share/nginx/html/customer;
      index login.html;
      try_files $uri $uri/ /login.html;
      add_header Cache-Control "no-store" always;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf)$ {
      root /usr/share/nginx/html/customer;
      expires 7d;
      add_header Cache-Control "public, max-age=604800" always;
      try_files $uri =404;
    }

    # -----------------------
    # Admin UI at /admin/
    # -----------------------
    location /admin/ {
      alias /usr/share/nginx/html/admin/;
      index login.html;
      try_files $uri $uri/ /admin/login.html;
      add_header Cache-Control "no-store" always;
    }

    location ~* ^/admin/.*\.(?:css|js|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf)$ {
      alias /usr/share/nginx/html/admin/;
      expires 7d;
      add_header Cache-Control "public, max-age=604800" always;
      try_files $uri =404;
    }
  }
}

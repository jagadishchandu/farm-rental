<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div class="brand">
          <div class="logo"></div>
          <div>
            <p class="kicker">Farm Tool Rentals</p>
            <h1>Admin Dashboard</h1>
          </div>
        </div>
        <div class="actions">
          <button class="btn" onclick="loadTools()">Refresh tools</button>
          <button class="btn" onclick="loadOrders()">Refresh orders</button>
          <button class="btn danger" onclick="logout()">Logout</button>
        </div>
      </div>

      <div class="grid">
        <!-- LEFT: Tool list -->
        <div class="panel">
          <div class="hd">
            <div>
              <h2>Tools <span class="badge" id="toolCount">0</span></h2>
              <p class="sub">Click a row to edit</p>
            </div>
          </div>
          <div class="bd">
            <div class="row">
              <input class="input" id="toolSearch" placeholder="Search tools..." />
              <button class="btn primary" onclick="loadTools()">Search</button>
            </div>

            <div class="hr"></div>

            <table class="table">
              <thead>
                <tr>
                  <th>ID</th><th>Name</th><th>Category</th><th>Status</th><th>Qty</th><th>Rate</th>
                </tr>
              </thead>
              <tbody id="toolsTbody"></tbody>
            </table>

            <p class="helper">Tip: set tool <b>Inactive</b> to hide it from customers.</p>
          </div>
        </div>

        <!-- RIGHT: Editor + Orders -->
        <div>
          <div class="panel">
            <div class="hd">
              <div>
                <h2>Tool editor</h2>
                <p class="sub">Create or update inventory</p>
              </div>
              <div class="actions">
                <button class="btn" onclick="fillForm(null)">New</button>
                <button class="btn primary" onclick="saveTool()">Save</button>
                <button class="btn danger" onclick="deleteTool()">Delete</button>
              </div>
            </div>

            <div class="bd">
              <div class="row">
                <input class="input" id="toolId" placeholder="Tool ID (blank = create)" />
                <select class="input" id="active">
                  <option value="true">Active</option>
                  <option value="false">Inactive</option>
                </select>
              </div>

              <div class="row" style="margin-top:10px;">
                <input class="input" id="name" placeholder="Name" />
                <input class="input" id="category" placeholder="Category" />
              </div>

              <div class="row" style="margin-top:10px;">
                <input class="input" id="hourly_rate" placeholder="Hourly rate (e.g. 25)" />
                <input class="input" id="total_qty" placeholder="Total qty (e.g. 5)" />
              </div>

              <div class="row" style="margin-top:10px;">
                <input class="input" id="image_url" placeholder="Image URL" oninput="renderPreview(this.value)" />
              </div>

              <div id="preview" class="preview"><div class="ph">Image preview</div></div>

              <div style="margin-top:10px;">
                <textarea id="description" placeholder="Description"></textarea>
              </div>

              <div id="toast" class="toast"><p class="t"></p><p class="d"></p></div>
            </div>
          </div>

          <div class="panel" style="margin-top:14px;">
            <div class="hd">
              <div>
                <h2>Recent orders <span class="badge" id="orderCount">0</span></h2>
                <p class="sub">Last 100 (from API)</p>
              </div>
              <div class="row" style="justify-content:flex-end;flex:0 0 auto;">
                <select class="input" id="orderFilter" style="max-width:220px;flex:0 0 auto;">
                  <option value="all">All</option>
                  <option value="draft">Draft</option>
                  <option value="confirmed">Confirmed</option>
                  <option value="cancelled">Cancelled</option>
                </select>
                <button class="btn primary" onclick="loadOrders()">Apply</button>
              </div>
            </div>
            <div class="bd">
              <div id="orders"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
    <script>
      // Code Generated by Sidekick is for learning and experimentation purposes only.
      requireAdmin();
      loadTools().catch(()=>{});
      loadOrders().catch(()=>{});
    </script>
  </body>
</html>

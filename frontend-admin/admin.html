<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin • Dashboard</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="head">
        <div class="brand">
          <div class="logo"></div>
          <div>
            <h1 class="h1">Inventory & Catalog</h1>
            <p class="sub">Create tools, set total quantity, activate/deactivate</p>
          </div>
        </div>
        <button class="btn" id="logoutBtn">Logout</button>
      </div>

      <div class="body grid">
        <div class="panel">
          <div style="font-weight:850; margin-bottom:10px;">Create tool</div>

          <div class="stack">
            <input class="input" id="name" placeholder="Tool name (e.g., Tractor)" />
            <div class="row">
              <input class="input" id="category" placeholder="Category" style="flex:1;min-width:180px;" />
              <input class="input" id="hourly_rate" type="number" step="0.01" placeholder="Hourly rate" style="width:170px;" />
              <input class="input" id="total_qty" type="number" step="1" placeholder="Total qty" style="width:140px;" />
            </div>
            <input class="input" id="image_url" placeholder="Image URL (optional)" />
            <button class="btn primary" id="createBtn">Create</button>
          </div>

          <div id="msg" class="msg error"></div>
        </div>

        <div class="panel">
          <div style="font-weight:850; margin-bottom:10px;">Tools</div>
          <div class="tools" id="tools"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
  <script>
    // Code Generated by Sidekick is for learning and experimentation purposes only.
    if(AdminAPI.role() !== "admin") window.location.href = "./login.html";

    document.getElementById("logoutBtn").onclick = () => {
      AdminAPI.clearAuth();
      window.location.href = "./login.html";
    };

    async function load(){
      const msg = document.getElementById("msg");
      msg.textContent = "";
      try{
        const tools = await AdminAPI.adminListTools();
        document.getElementById("tools").innerHTML = tools.map(t => `
          <div class="tool">
            <div class="thumb">${t.image_url ? `<img src="${t.image_url}" alt="">` : ""}</div>
            <div class="meta">
              <p class="name">#${t.id} ${t.name}</p>
              <div class="desc">${t.category} • $${Number(t.hourly_rate||0).toFixed(2)}/hr</div>
              <div class="desc">${t.description || ""}</div>
              <div class="kpis" style="margin-top:8px;">
                <span class="pill">Qty: <b>${t.total_qty}</b></span>
                <span class="pill">Active: <b>${t.active ? "yes" : "no"}</b></span>
              </div>
            </div>
            <div class="right">
              <div class="row" style="justify-content:flex-end;">
                <input class="input" id="qty_${t.id}" type="number" value="${t.total_qty}" style="width:110px;" />
                <button class="btn" onclick="setQty(${t.id})">Set qty</button>
              </div>
              <div class="row" style="justify-content:flex-end;">
                <button class="btn" onclick="toggle(${t.id}, ${t.active ? "false":"true"})">${t.active ? "Deactivate":"Activate"}</button>
                <button class="btn" onclick="delTool(${t.id})">Delete</button>
              </div>
            </div>
          </div>
        `).join("") || `<div class="sub">No tools yet.</div>`;
      }catch(e){
        msg.textContent = "Failed to load tools (auth/CORS).";
      }
    }

    document.getElementById("createBtn").onclick = async () => {
      const msg = document.getElementById("msg");
      msg.textContent = "";
      try{
        await AdminAPI.adminCreateTool({
          name: document.getElementById("name").value.trim(),
          category: document.getElementById("category").value.trim(),
          hourly_rate: parseFloat(document.getElementById("hourly_rate").value || "0"),
          total_qty: parseInt(document.getElementById("total_qty").value || "0", 10),
          image_url: document.getElementById("image_url").value.trim(),
          active: true
        });
        msg.className = "msg ok";
        msg.textContent = "Tool created.";
        await load();
      }catch(e){
        msg.className = "msg error";
        msg.textContent = "Create failed.";
      }
    };

    window.setQty = async (id) => {
      const msg = document.getElementById("msg");
      msg.textContent = "";
      try{
        const qty = parseInt(document.getElementById(`qty_${id}`).value || "0", 10);
        await AdminAPI.adminUpdateTool(id, { total_qty: qty });
        msg.className = "msg ok";
        msg.textContent = "Quantity updated.";
        await load();
      }catch(e){
        msg.className = "msg error";
        msg.textContent = "Update failed.";
      }
    };

    window.toggle = async (id, active) => {
      const msg = document.getElementById("msg");
      msg.textContent = "";
      try{
        await AdminAPI.adminUpdateTool(id, { active });
        msg.className = "msg ok";
        msg.textContent = "Status updated.";
        await load();
      }catch(e){
        msg.className = "msg error";
        msg.textContent = "Update failed.";
      }
    };

    window.delTool = async (id) => {
      const msg = document.getElementById("msg");
      msg.textContent = "";
      if(!confirm(`Delete tool #${id}?`)) return;
      try{
        await AdminAPI.adminDeleteTool(id);
        msg.className = "msg ok";
        msg.textContent = "Deleted.";
        await load();
      }catch(e){
        msg.className = "msg error";
        msg.textContent = "Delete failed.";
      }
    };

    load();
  </script>
</body>
</html>

{% extends "base.html" %}
{% load socialaccount %}
{% block title %}Login{% endblock %}
{% block content %}
  <div class="card">
    <div class="h1">Login</div>

    <div class="row" style="margin-top:10px;">
      <div class="col">
        <a class="btn btn-primary" href="{% provider_login_url 'google' %}">Continue with Google</a>
      </div>
      <div class="col">
        <a class="btn btn-primary" href="{% provider_login_url 'facebook' %}">Continue with Meta</a>
      </div>
    </div>

    <div style="margin-top:10px;">
      <a class="btn pill" href="/auth/whatsapp/start/">Login with WhatsApp OTP</a>
    </div>

    <hr style="border-color:rgba(255,255,255,.10);margin:16px 0;">

    <form method="post" action="/accounts/login/">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary" type="submit">Login</button>
    </form>

    <div style="margin-top:10px;" class="muted">
      New here? <a class="pill" href="/accounts/signup/">Create account</a>
    </div>
  </div>
{% endblock %}

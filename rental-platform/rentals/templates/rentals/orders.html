{% extends "base.html" %}
{% block title %}My Orders{% endblock %}
{% block content %}
  <div class="h1">My Orders</div>
  <div class="card">
    {% for o in orders %}
      <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08);">
        <div>
          <div style="font-weight:900;">Order #{{ o.id }}</div>
          <div class="muted">{{ o.created_at }}</div>
        </div>
        <div style="display:flex;gap:10px;align-items:center;">
          <span class="badge">{{ o.status }}</span>
          <a class="btn" href="/rentals/orders/{{ o.id }}/">Details</a>
          <a class="btn btn-primary" href="/payments/{{ o.id }}/">Pay</a>
        </div>
      </div>
    {% empty %}
      <div class="muted">No orders yet.</div>
    {% endfor %}
  </div>
{% endblock %}

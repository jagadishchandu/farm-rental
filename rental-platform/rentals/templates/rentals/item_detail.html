{% extends "base.html" %}
{% block title %}{{ item.name }}{% endblock %}
{% block content %}
  <div class="row">
    <div class="col">
      <div class="card">
        <div class="badge">{{ item.category.name|default:"General" }}</div>
        <div class="h1">{{ item.name }}</div>
        <div class="muted">{{ item.description }}</div>
        <div style="margin-top:12px;"><b>₹{{ item.daily_price }}</b> <span class="muted">per day</span></div>
      </div>
    </div>

    <div class="col">
      <div class="card">
        <div style="font-weight:900;font-size:18px;">Add to cart</div>
        <form method="post" style="margin-top:10px;">
          {% csrf_token %}
          <label>Quantity</label>
          {{ form.qty }}
          <label>Days</label>
          {{ form.days }}
          <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;">
            <button class="btn btn-primary" type="submit">Add</button>
            <a class="btn" href="/rentals/">Back</a>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}

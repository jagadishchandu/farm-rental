{% extends "base.html" %}
{% block title %}Categories{% endblock %}
{% block content %}
  <div class="row">
    <div class="col"><div class="h1">Categories (CRUD)</div></div>
    <div class="col" style="display:flex;justify-content:flex-end;align-items:flex-end;">
      <a class="btn btn-primary" href="/admin-portal/categories/new/">New Category</a>
    </div>
  </div>
  <div class="card">
    {% for c in cats %}
      <div style="padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08);">
        <div style="font-weight:900;">{{ c.name }}</div>
      </div>
    {% empty %}
      <div class="muted">No categories.</div>
    {% endfor %}
  </div>
{% endblock %}

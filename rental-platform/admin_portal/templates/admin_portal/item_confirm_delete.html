{% extends "base.html" %}
{% block title %}Delete Item{% endblock %}
{% block content %}
  <div class="card">
    <div class="h1">Delete Item</div>
    <div class="muted">Are you sure you want to delete <b>{{ item.name }}</b>?</div>
    <form method="post" style="margin-top:12px;">
      {% csrf_token %}
      <button class="btn btn-danger" type="submit">Yes, delete</button>
      <a class="btn" href="/admin-portal/items/">Cancel</a>
    </form>
  </div>
{% endblock %}

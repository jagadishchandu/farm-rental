{% extends "base.html" %}
{% block title %}Admin Items{% endblock %}
{% block content %}
  <div class="row">
    <div class="col"><div class="h1">Items (CRUD)</div></div>
    <div class="col" style="display:flex;justify-content:flex-end;align-items:flex-end;">
      <a class="btn btn-primary" href="/admin-portal/items/new/">New Item</a>
    </div>
  </div>

  <div class="card">
    {% for i in items %}
      <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08);">
        <div>
          <div style="font-weight:900;">{{ i.name }}</div>
          <div class="muted">₹{{ i.daily_price }}/day • Qty {{ i.available_qty }} • Active {{ i.is_active }}</div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <a class="btn" href="/admin-portal/items/{{ i.id }}/edit/">Edit</a>
          <a class="btn btn-danger" href="/admin-portal/items/{{ i.id }}/delete/">Delete</a>
        </div>
      </div>
    {% empty %}
      <div class="muted">No items yet.</div>
    {% endfor %}
  </div>
{% endblock %}

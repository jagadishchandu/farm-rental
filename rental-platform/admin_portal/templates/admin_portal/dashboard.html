{% extends "base.html" %}
{% block title %}Admin Portal{% endblock %}
{% block content %}
  <div class="h1">Admin Portal</div>
  <div class="grid">
    <div class="card">
      <div class="muted">Items</div>
      <div style="font-size:28px;font-weight:900;margin-top:6px;">{{ items_count }}</div>
      <a class="btn" style="margin-top:10px;" href="/admin-portal/items/">Manage items</a>
    </div>
    <div class="card">
      <div class="muted">Pending verifications</div>
      <div style="font-size:28px;font-weight:900;margin-top:6px;">{{ orders_pending }}</div>
      <a class="btn" style="margin-top:10px;" href="/admin-portal/orders/">Review orders</a>
    </div>
    <div class="card">
      <div class="muted">Payment QR</div>
      <div style="font-size:28px;font-weight:900;margin-top:6px;">Settings</div>
      <a class="btn" style="margin-top:10px;" href="/admin-portal/payment-settings/">Update QR</a>
    </div>
  </div>
{% endblock %}

{% extends "base.html" %}
{% block title %}First Admin Setup{% endblock %}
{% block content %}
  <div class="card">
    <div class="h1">First Admin Setup</div>
    <div class="muted">This page works only once (no admin exists).</div>
    <form method="post" style="margin-top:10px;">
      {% csrf_token %}
      <label>Email</label>{{ form.email }}
      <label>First name</label>{{ form.first_name }}
      <label>Last name</label>{{ form.last_name }}
      <label>Password</label>{{ form.password }}
      <div style="margin-top:12px;">
        <button class="btn btn-primary" type="submit">Create Admin</button>
      </div>
    </form>
  </div>
{% endblock %}

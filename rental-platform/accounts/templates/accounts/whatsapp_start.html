{% extends "base.html" %}
{% block title %}WhatsApp OTP{% endblock %}
{% block content %}
  <div class="card">
    <div class="h1">Login via WhatsApp OTP</div>
    <div class="muted">We’ll send a 6-digit OTP to WhatsApp.</div>
    <form method="post" style="margin-top:10px;">
      {% csrf_token %}
      <label>Phone</label>{{ form.phone }}
      <div style="margin-top:12px;">
        <button class="btn btn-primary" type="submit">Send OTP</button>
      </div>
    </form>
  </div>
{% endblock %}
